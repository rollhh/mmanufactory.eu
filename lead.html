<!DOCTYPE html>
<html lang="lv">
<head>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-BZXYH7S8QH"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-BZXYH7S8QH');
  gtag('config', 'AW-18008605575');
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pieteikums konsultācijai</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>

<body class="bg-white text-black flex items-center justify-center min-h-screen">

<form id="leadForm" class="w-full max-w-lg p-6 border rounded-xl shadow-lg space-y-4">

<h1 class="text-2xl font-bold text-center">Pieteikums konsultācijai</h1>

<textarea name="request" placeholder="Kādas mēbeles Jūs interesē? Ja nepieciešams, zemāk pievienojiet attēlu." class="w-full p-3 border rounded" required></textarea>

<input type="file" id="fileInput" accept="image/*" class="w-full p-2 border rounded" />

<textarea name="contact" placeholder="Jūsu vārds un telefona nr. saziņai. Kurā pilsētā atrodas objekts?" class="w-full p-3 border rounded" required></textarea>

<button type="submit" id="submitBtn" class="w-full bg-black text-white py-3 rounded font-semibold">
Nosūtīt
</button>

</form>

<script>
function gtag_report_conversion() {
  gtag('event', 'conversion', {
    'send_to': 'AW-18008605575/OB0lCJjHy5ccEIeHlotD',
    'value': 1.0,
    'currency': 'EUR'
  });
}


document.getElementById('leadForm').addEventListener('submit', async function(e){
  e.preventDefault();

  const btn = document.getElementById('submitBtn');
  btn.innerText = "Nosūtīšana...";
  btn.disabled = true;

  const request = this.request.value;
  const contact = this.contact.value;
  const file = document.getElementById('fileInput').files[0];

  try {

    let response;

    // ЕСЛИ ЕСТЬ ФОТО
    if (file) {
      const formData = new FormData();
      formData.append("chat_id", "-5164464613");
      formData.append("photo", file);
      formData.append("caption",
        "📌 " + request + "\n\n" +
        "📞 " + contact
      );

      response = await fetch("https://api.telegram.org/bot8614666986:AAE_i4cqdB8yv_ixOZ9BTOfeup4whbn0vug/sendPhoto", {
        method: "POST",
        body: formData
      });

    } else {
      response = await fetch("https://api.telegram.org/bot8614666986:AAE_i4cqdB8yv_ixOZ9BTOfeup4whbn0vug/sendMessage", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          chat_id: "-5164464613",
          text:
            "📌 " + request + "\n\n" +
            "📞 " + contact
        })
      });
    }

    const data = await response.json();

    if (!data.ok) {
      throw new Error(JSON.stringify(data));
    }

    gtag_report_conversion();

    alert("Paldies! ✅ Mēs sazināsimies tuvākajā laikā!");
    this.reset();
    setTimeout(() => {
  window.location.href = "https://mmanufactory.eu/";
}, 500);

  } catch (err) {
    console.error(err);
    alert("Kļūda ❌");
  }

  btn.innerText = "Nosūtīt";
  btn.disabled = false;
});
</script>

</body>
</html>
