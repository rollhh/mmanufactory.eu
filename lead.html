<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pieteikums</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>

<body class="bg-white text-black flex items-center justify-center min-h-screen">

<form id="leadForm" class="w-full max-w-lg p-6 border rounded-xl shadow-lg space-y-4">

<h1 class="text-2xl font-bold text-center">Saņemt piedāvājumu</h1>

<textarea name="request" placeholder="Kas Jūs interesē?" class="w-full p-3 border rounded" required></textarea>

<input type="file" id="fileInput" accept="image/*" class="w-full p-2 border rounded" />

<textarea name="contact" placeholder="Jūsu kontakts" class="w-full p-3 border rounded" required></textarea>

<button type="submit" id="submitBtn" class="w-full bg-black text-white py-3 rounded font-semibold">
Nosūtīt
</button>

</form>

<script>
document.getElementById('leadForm').addEventListener('submit', async function(e){
  e.preventDefault();

  const btn = document.getElementById('submitBtn');
  btn.innerText = "Отправка...";
  btn.disabled = true;

  const request = this.request.value;
  const contact = this.contact.value;
  const file = document.getElementById('fileInput').files[0];

  try {

    // ЕСЛИ ЕСТЬ ФОТО → отправляем фото
    if (file) {
      const formData = new FormData();
      formData.append("chat_id", "-5164464613");
      formData.append("photo", file);
      formData.append("caption",
        "🔥 НОВЫЙ ЛИД\n\n" +
        "📌 Запрос:\n" + request + "\n\n" +
        "📞 Контакт:\n" + contact
      );

      await fetch("https://api.telegram.org/bot8614666986:AAG4m08eVjXXCXYJBuxDQj5PKIOy9ExOhgs/sendPhoto", {
        method: "POST",
        body: formData
      });

    } else {
      // ЕСЛИ БЕЗ ФОТО → просто текст
      await fetch("https://api.telegram.org/bot8614666986:AAG4m08eVjXXCXYJBuxDQj5PKIOy9ExOhgs/sendMessage", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          chat_id: "-5164464613",
          text:
            "🔥 НОВЫЙ ЛИД\n\n" +
            "📌 Запрос:\n" + request + "\n\n" +
            "📞 Контакт:\n" + contact
        })
      });
    }

    alert("Заявка отправлена ✅");
    this.reset();

  } catch (err) {
    console.error(err);
    alert("Ошибка ❌");
  }

  btn.innerText = "Nosūtīt";
  btn.disabled = false;
});
</script>

</body>
</html>
