<script>
document.getElementById('leadForm').addEventListener('submit', async function(e){
  e.preventDefault();

  const btn = document.getElementById('submitBtn');
  btn.innerText = "Nosūtīšana...";
  btn.disabled = true;

  const request = this.request.value;
  const contact = this.contact.value;
  const file = document.getElementById('fileInput').files[0];

  try {

    let tgRes;

    if (file) {
      const formData = new FormData();
      formData.append("chat_id", "-5164464613");
      formData.append("photo", file);
      formData.append("caption",
        "📌 " + request + "\n\n" +
        "📞 " + contact
      );

      tgRes = await fetch("https://api.telegram.org/bot8614666986:AAG4m08eVjXXCXYJBuxDQj5PKIOy9ExOhgs/sendPhoto", {
        method: "POST",
        body: formData
      });

    } else {
      tgRes = await fetch("https://api.telegram.org/bot8614666986:AAG4m08eVjXXCXYJBuxDQj5PKIOy9ExOhgs/sendMessage", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          chat_id: "-5164464613",
          text:
            "📌 " + request + "\n\n" +
            "📞 " + contact
        })
      });
    }

    const data = await tgRes.json();

    if (!data.ok) {
      throw new Error("Telegram error: " + JSON.stringify(data));
    }

    alert("Paldies! ✅ Mēs sazināsimies tuvākajā laikā!");
    this.reset();

  } catch (err) {
    console.error(err);
    alert("Kļūda ❌");
  }

  btn.innerText = "Nosūtīt";
  btn.disabled = false;
});
</script>
